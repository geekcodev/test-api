; Error reporting — show everything in dev
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On
error_log = /var/www/html/storage/logs/php_errors.log
short_open_tag = Off

date.timezone = Europe/Moscow
max_input_vars = 10000
cgi.fix_pathinfo = 0
;mail.add_x_header = Off

; Memory & execution
memory_limit = 2048M
max_execution_time = 900
max_input_time = 900

; Upload
upload_max_filesize = 64M
post_max_size = 64M
max_file_uploads = 20

; OPcache — enabled even in dev for FrankenPHP worker mode
; (worker mode requires opcache)
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
opcache.save_comments = 1
opcache.fast_shutdown = 1

; Realpath cache — critical for worker mode performance
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Sessions
session.gc_maxlifetime = 7200
session.save_path = /tmp
session.cookie_path = /
session.use_strict_mode = On

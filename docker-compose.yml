services:

  pgsql:
    restart: always
    image: postgres:18.1-alpine3.22
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - TZ=Europe/Moscow
    networks:
      - network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    restart: always
    image: redis:8.4-alpine3.22
    command: redis-server --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    volumes:
      - redis-data:/data
    environment:
      - TZ=Europe/Moscow
    networks:
      - network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    restart: always
    build:
      context: ./
      dockerfile: ./docker/Dockerfile
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    command: [ "php", "artisan", "octane:start",
               "--server=frankenphp",
               "--host=0.0.0.0",
               "--port=8000",
               "--admin-port=2019",
               "--workers=2",
               "--max-requests=500",
               "--watch" ]
    volumes:
      - ./app:/var/www/html
    ports:
      - "${HTTP_PORT:-80}:8000"
    environment:
      - APP_NAME=${APP_NAME}
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      - APP_ENV=development
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - VITE_APP_NAME=${APP_NAME}
      - TZ=Europe/Moscow
    networks:
      - network
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  horizon:
    restart: unless-stopped
    build:
      context: ./
      dockerfile: ./docker/Dockerfile
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: /usr/local/bin/docker-horizon-entrypoint.sh
    healthcheck:
      disable: true
      test: [ ]
    volumes:
      - ./app:/var/www/html
    environment:
      - APP_NAME=${APP_NAME}
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      - APP_ENV=development
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - VITE_APP_NAME=${APP_NAME}
      - TZ=Europe/Moscow
    networks:
      - network
    depends_on:
      app:
        condition: service_healthy

volumes:
  db-data:
  redis-data:
  upload-data:
  private-data:
  storage-logs:

networks:
  network:
    driver: bridge
